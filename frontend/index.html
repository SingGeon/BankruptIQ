<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BankruptIQ — Analiză predictivă de faliment pentru companii BVB</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #08090b;
      --bg-elev: #0d0f13;
      --bg-elev-2: #14171c;
      --bg-card: #0f1116;
      --fg: #e8e9ee;
      --fg-dim: #9aa0ac;
      --fg-faint: #555a66;
      --border: #1b1e25;
      --border-strong: #2a2e38;
      --accent: #7c8aff;
      --accent-glow: rgba(124, 138, 255, 0.4);
      --accent-soft: rgba(124, 138, 255, 0.12);
      --serif: "Instrument Serif", Georgia, serif;
      --sans: "Geist", system-ui, sans-serif;
      --mono: "Geist Mono", ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; cursor: pointer; }

    .landing {
      max-width: 100%;
      overflow-x: hidden;
      position: relative;
    }

    /* ───── shared section heading ───── */
    .section-head {
      max-width: 760px;
      margin: 0 auto 56px;
      text-align: center;
    }
    .section-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--accent);
      padding: 5px 12px;
      border: 1px solid var(--accent-soft);
      border-radius: 999px;
      background: var(--accent-soft);
      margin-bottom: 22px;
    }
    .section-title {
      font-family: var(--serif);
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 18px;
      color: var(--fg);
      text-wrap: balance;
    }
    .text-accent { color: var(--accent); font-style: italic; }
    .section-sub {
      color: var(--fg-dim);
      font-size: 17px;
      max-width: 620px;
      margin: 0 auto;
      text-wrap: pretty;
    }

    /* ───── buttons ───── */
    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--fg);
      color: var(--bg);
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      transition: transform 200ms ease, background 200ms ease, box-shadow 200ms ease;
      border: 1px solid var(--fg);
    }
    .btn-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.12);
    }
    .btn-cta-lg {
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
    }
    .btn-cta-lg .btn-arrow {
      transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .btn-cta-lg:hover .btn-arrow { transform: translateX(4px); }
    .btn-ghost-nav {
      padding: 9px 14px;
      color: var(--fg-dim);
      font-size: 14px;
      transition: color 160ms ease;
    }
    .btn-ghost-nav:hover { color: var(--fg); }
    .btn-ghost-lg {
      display: inline-flex;
      align-items: center;
      padding: 14px 22px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      color: var(--fg);
      font-weight: 500;
      font-size: 15px;
      transition: all 200ms ease;
    }
    .btn-ghost-lg:hover { border-color: var(--fg-dim); background: var(--bg-elev); }

    /* ───── NAV ───── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 12px 24px;
      transition: padding 200ms ease, background 200ms ease;
    }
    .nav-scrolled {
      padding: 8px 24px;
      background: rgba(8, 9, 11, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: -0.01em;
    }
    .nav-logo-mark {
      width: 28px; height: 28px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: -0.02em;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      font-size: 14px;
    }
    .nav-links a {
      color: var(--fg-dim);
      transition: color 160ms ease;
      position: relative;
    }
    .nav-links a:hover { color: var(--fg); }
    .nav-cta { display: flex; align-items: center; gap: 6px; }

    /* ───── HERO ───── */
    .hero {
      position: relative;
      padding: 180px 24px 80px;
      max-width: 1240px;
      margin: 0 auto;
      text-align: center;
      overflow: hidden;
    }
    .hero-ambient {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 1200px;
      height: 700px;
      background: radial-gradient(ellipse 50% 50% at center 30%, var(--accent-glow), transparent 70%);
      opacity: 0.4;
      pointer-events: none;
      z-index: -1;
      animation: ambientFloat 18s ease-in-out infinite;
    }
    @keyframes ambientFloat {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 0.4; }
      50%      { transform: translateX(-48%) translateY(-20px) scale(1.05); opacity: 0.55; }
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 60% at center 30%, black, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at center 30%, black, transparent 80%);
      opacity: 0.35;
      pointer-events: none;
      z-index: -1;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      background: var(--bg-elev);
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--fg-dim);
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 600ms ease forwards;
    }
    .hero-tag-dot {
      width: 6px; height: 6px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 8px #22c55e;
      animation: livePulse 1.6s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    .hero-headline {
      font-family: var(--serif);
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.03em;
      margin: 0 0 30px;
      max-width: 1100px;
      margin-inline: auto;
      text-wrap: balance;
    }
    .hero-word {
      display: inline-block;
      margin-right: 0.22em;
      opacity: 0;
      transform: translateY(20px);
      filter: blur(4px);
      animation: wordIn 800ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes wordIn {
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .hero-word-accent {
      font-style: italic;
      color: var(--accent);
      position: relative;
    }
    .hero-word-accent::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0.08em;
      height: 0.06em;
      background: var(--accent);
      transform-origin: left;
      transform: scaleX(0);
      animation: lineDraw 700ms 1500ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0.5;
    }
    @keyframes lineDraw { to { transform: scaleX(1); } }

    .hero-subtitle {
      max-width: 640px;
      margin: 0 auto 44px;
      font-size: 18px;
      color: var(--fg-dim);
      line-height: 1.55;
      text-wrap: pretty;
    }
    .hero-subword {
      opacity: 0;
      animation: fadeUp 400ms ease forwards;
      display: inline-block;
      margin-right: 0.28em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-ctas {
      display: flex; justify-content: center; gap: 12px;
      margin-bottom: 80px;
      opacity: 0;
      animation: fadeUp 600ms 1400ms ease forwards;
      flex-wrap: wrap;
    }

    .hero-meta {
      display: flex; justify-content: center; align-items: center;
      gap: 40px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 600ms 1800ms ease forwards;
    }
    .hero-meta-item { text-align: center; }
    .hero-meta-num {
      font-family: var(--serif);
      font-size: 38px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--fg);
      font-variant-numeric: tabular-nums;
    }
    .hero-meta-lbl {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--fg-faint);
      margin-top: 6px;
      text-transform: uppercase;
    }
    .hero-meta-sep {
      width: 1px;
      height: 24px;
      background: var(--border-strong);
    }

    /* ───── PRODUCT PREVIEW ───── */
    .preview {
      padding: 40px 24px 60px;
      max-width: 1240px;
      margin: 0 auto;
    }
    .preview-frame {
      background: var(--bg-elev);
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.02),
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 80px var(--accent-soft);
      opacity: 0;
      transform: translateY(40px) scale(0.97);
      transition: opacity 800ms cubic-bezier(0.22, 1, 0.36, 1), transform 800ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .preview-frame.visible { opacity: 1; transform: translateY(0) scale(1); }

    .preview-chrome {
      display: flex; align-items: center;
      padding: 12px 16px;
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .preview-dots { display: flex; gap: 6px; }
    .preview-dots span {
      width: 11px; height: 11px;
      background: var(--border-strong);
      border-radius: 50%;
    }
    .preview-dots span:nth-child(1) { background: #ed6a5e; }
    .preview-dots span:nth-child(2) { background: #f5bf4f; }
    .preview-dots span:nth-child(3) { background: #62c554; }
    .preview-url {
      flex: 1;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-faint);
      padding: 4px 10px;
      background: var(--bg-elev);
      border-radius: 6px;
      max-width: 320px;
      margin: 0 auto;
    }
    .preview-live {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #ef4444;
      font-weight: 600;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 6px #ef4444;
      animation: livePulse 1.2s ease-in-out infinite;
    }
    .preview-body {
      background: #0a0c10;
      min-height: 540px;
    }

    .preview-caption {
      display: flex; justify-content: center; align-items: center;
      gap: 14px;
      margin-top: 24px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg-dim);
    }
    .preview-caption-num {
      color: var(--accent);
      font-weight: 600;
    }

    /* ───── Dashboard mockup (inside preview frame) ───── */
    .mock {
      display: grid;
      grid-template-columns: 160px 1fr;
      min-height: 540px;
      font-family: var(--sans);
      font-size: 12px;
      color: #e5e7eb;
    }
    .mock-side {
      background: #0a0c10;
      border-right: 1px solid #1a1e26;
      padding: 14px 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .mock-brand {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 14px;
      padding: 6px 8px;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .mock-nav-item {
      padding: 7px 10px;
      color: #6b7280;
      border-radius: 4px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px;
    }
    .mock-nav-item.active { background: #14171c; color: #e5e7eb; border-left: 2px solid var(--accent); padding-left: 8px; }
    .mock-badge {
      margin-left: auto;
      background: #f59e0b;
      color: #000;
      font-family: var(--mono);
      font-size: 9px;
      padding: 0 5px;
      border-radius: 999px;
      font-weight: 700;
    }

    .mock-main { display: flex; flex-direction: column; }
    .mock-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid #1a1e26;
      background: rgba(13, 15, 19, 0.6);
    }
    .mock-search {
      flex: 1;
      padding: 6px 10px;
      background: #0f1116;
      border: 1px solid #1a1e26;
      border-radius: 6px;
      color: #6b7280;
      font-size: 11px;
    }
    .mock-seg {
      display: flex;
      background: #0f1116;
      border: 1px solid #1a1e26;
      border-radius: 6px;
      padding: 2px;
      font-family: var(--mono);
      font-size: 10px;
    }
    .mock-seg span { padding: 3px 8px; color: #6b7280; border-radius: 3px; }
    .mock-seg .active { background: #1a1e26; color: #e5e7eb; }

    .mock-ticker {
      display: flex; align-items: center;
      padding: 6px 14px;
      gap: 10px;
      background: #0d0f13;
      border-bottom: 1px solid #1a1e26;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.15em;
      overflow: hidden;
    }
    .mock-ticker-stream {
      display: flex; gap: 20px;
      color: #d1d5db;
      animation: tickerSlow 28s linear infinite;
      white-space: nowrap;
    }
    .mock-ticker-stream span b { color: #e5e7eb; }
    @keyframes tickerSlow {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .mock-hero {
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      gap: 1px;
      background: #1a1e26;
      border-bottom: 1px solid #1a1e26;
    }
    .mock-z, .mock-metrics, .mock-alerts {
      background: #0d0f13;
      padding: 14px;
    }
    .mock-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .mock-gauge { display: block; margin: 4px auto; }
    .mock-livechart { display: block; margin: 6px 0 4px; }
    .mock-z { text-align: left; display: flex; flex-direction: column; }
    .mock-z-row {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding-top: 6px;
      border-top: 1px solid #1a1e26;
      margin-top: 8px;
    }
    .mock-z-lbl {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.15em;
      color: #6b7280;
    }
    .mock-z-val {
      font-family: var(--serif);
      font-size: 36px;
      line-height: 1;
      margin-top: 4px;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }
    .mock-z-pill {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      padding: 3px 8px;
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border-radius: 999px;
    }

    .mock-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      grid-auto-rows: 1fr;
    }
    .mock-metric { display: flex; flex-direction: column; }
    .mock-mlbl {
      font-family: var(--mono);
      font-size: 9px;
      color: #6b7280;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .mock-mval {
      font-family: var(--serif);
      font-size: 24px;
      line-height: 1;
      margin: 4px 0;
      font-variant-numeric: tabular-nums;
    }
    .mock-spark { width: 100%; height: 24px; }

    .mock-alerts { display: flex; flex-direction: column; gap: 8px; }
    .mock-alert { display: flex; gap: 8px; padding-bottom: 8px; border-bottom: 1px solid #1a1e26; }
    .mock-alert:last-child { border-bottom: none; }
    .mock-alert-bar { width: 2px; min-width: 2px; border-radius: 1px; }
    .mock-alert-tk {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    .mock-alert-title { font-size: 11px; margin-top: 2px; color: #d1d5db; }

    .mock-table { padding: 8px 14px; font-family: var(--mono); font-size: 10px; }
    .mock-th, .mock-tr {
      display: grid;
      grid-template-columns: 60px 1fr 60px 70px 80px;
      gap: 12px;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #1a1e26;
    }
    .mock-th { color: #6b7280; font-size: 9px; letter-spacing: 0.12em; }
    .mock-tr { color: #d1d5db; font-size: 11px; }
    .mock-tk {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border: 1px solid;
      border-radius: 4px;
      text-align: center;
      width: fit-content;
    }
    .mock-cn { font-family: var(--sans); }
    .mock-spark-sm { width: 70px; height: 18px; }

    /* ───── LIVE STATS ───── */
    .stats {
      padding: 100px 24px;
      max-width: 1240px;
      margin: 0 auto;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      padding: 36px 28px;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-val {
      font-family: var(--serif);
      font-size: clamp(40px, 5vw, 60px);
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--fg);
      font-variant-numeric: tabular-nums;
      margin-bottom: 14px;
    }
    .stat-lbl {
      font-size: 14px;
      color: var(--fg);
      font-weight: 500;
    }
    .stat-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-faint);
      margin-top: 6px;
    }

    /* ───── FADE IN ───── */
    .fadein {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 700ms cubic-bezier(0.22, 1, 0.36, 1), transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .fadein.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ───── FEATURES ───── */
    .features {
      padding: 100px 24px;
      max-width: 1240px;
      margin: 0 auto;
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .feature-card {
      padding: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 240ms cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
      height: 100%;
    }
    .feature-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 240ms ease;
    }
    .feature-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    .feature-card:hover::before { opacity: 1; }
    .feature-icon {
      width: 44px; height: 44px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-soft);
      color: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .feature-title {
      font-family: var(--sans);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 10px;
      color: var(--fg);
    }
    .feature-desc {
      font-size: 14px;
      color: var(--fg-dim);
      line-height: 1.55;
      margin: 0 0 18px;
    }
    .feature-bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .feature-bullets li {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg-faint);
      padding-left: 16px;
      position: relative;
    }
    .feature-bullets li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* ───── HOW IT WORKS ───── */
    .how {
      padding: 100px 24px;
      max-width: 1240px;
      margin: 0 auto;
    }
    .how-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .how-step {
      padding: 32px 26px;
      background: var(--bg-card);
      transition: background 240ms ease;
      height: 100%;
    }
    .how-step:hover { background: var(--bg-elev); }
    .how-num {
      font-family: var(--serif);
      font-size: 48px;
      font-style: italic;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 18px;
    }
    .how-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 8px;
    }
    .how-desc {
      font-size: 14px;
      color: var(--fg-dim);
      line-height: 1.55;
      margin: 0;
    }

    /* ───── CASES STRIP ───── */
    .cases-section {
      padding: 100px 24px;
      max-width: 1240px;
      margin: 0 auto;
    }
    .cases-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .case-card {
      padding: 22px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 240ms ease;
      height: 100%;
    }
    .case-card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
    .case-card-year {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-faint);
      letter-spacing: 0.1em;
    }
    .case-card-name {
      font-size: 16px;
      font-weight: 600;
      margin: 6px 0 4px;
      letter-spacing: -0.01em;
    }
    .case-card-debt {
      font-size: 12px;
      color: var(--fg-dim);
      margin-bottom: 16px;
    }
    .case-card-debt strong { color: var(--fg); font-family: var(--mono); font-weight: 600; }
    .case-card-bar {
      height: 4px;
      background: var(--bg-elev-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .case-card-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ef4444, #f59e0b);
      transition: width 1000ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .case-card-rec {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-faint);
      margin-top: 8px;
    }
    .case-card-rec span { color: var(--fg); font-weight: 600; }

    /* ───── CTA SECTION ───── */
    .cta-section {
      padding: 120px 24px;
      max-width: 1240px;
      margin: 0 auto;
    }
    .cta-inner {
      position: relative;
      text-align: center;
      padding: 80px 40px;
      border: 1px solid var(--border-strong);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--bg-elev), var(--bg-card));
      overflow: hidden;
    }
    .cta-glow {
      position: absolute;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle at center, var(--accent-glow), transparent 60%);
      opacity: 0.6;
      pointer-events: none;
    }
    .cta-title {
      position: relative;
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 18px 0;
      text-wrap: balance;
    }
    .cta-sub {
      position: relative;
      color: var(--fg-dim);
      font-size: 17px;
      max-width: 540px;
      margin: 0 auto 32px;
      text-wrap: pretty;
    }
    .cta-buttons {
      position: relative;
      display: flex; justify-content: center; gap: 12px;
      flex-wrap: wrap;
    }

    /* ───── FOOTER ───── */
    .footer {
      padding: 60px 24px 30px;
      max-width: 1240px;
      margin: 0 auto;
      border-top: 1px solid var(--border);
    }
    .footer-inner {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 40px;
      padding-bottom: 40px;
    }
    .footer-brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600;
      font-size: 16px;
    }
    .footer-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .footer-cols > div { display: flex; flex-direction: column; gap: 8px; }
    .footer-col-head {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--fg-faint);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .footer-cols a {
      font-size: 13px;
      color: var(--fg-dim);
      transition: color 160ms ease;
    }
    .footer-cols a:hover { color: var(--fg); }
    .footer-bottom {
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-faint);
    }
    .footer-status { display: flex; align-items: center; gap: 6px; color: #22c55e; }
    .footer-status .live-dot { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

    /* responsive */
    @media (max-width: 960px) {
      .nav-links { display: none; }
      .feature-grid, .how-grid, .cases-grid, .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .stat { border-right: none; border-bottom: 1px solid var(--border); }
      .mock-hero { grid-template-columns: 1fr; }
      .footer-inner { grid-template-columns: 1fr; }
      .footer-cols { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .feature-grid, .how-grid, .cases-grid, .stats-grid {
        grid-template-columns: 1fr;
      }
      .preview-body { min-height: auto; }
      .mock { grid-template-columns: 1fr; }
      .mock-side { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="landing/landing.jsx"></script>
</body>
</html>
